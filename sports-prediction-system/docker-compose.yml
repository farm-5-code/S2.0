version: '3.9'
services:
  sports-prediction-app:
    build: .
    container_name: sports-prediction-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env.example
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
      - ./logs:/app/logs
